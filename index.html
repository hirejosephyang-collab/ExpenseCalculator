<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고정비 계산기 (Refactored)</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid #ddd;padding:8px;text-align:left}
.amount{text-align:right}
</style>
</head>
<body>

<div class="card">
  <input type="date" id="selDate">
  <input type="number" id="amex" placeholder="AMEX">
  <input type="number" id="td" placeholder="TD">
</div>

<div class="card">
  <div>Scheduled: <span id="sch"></span></div>
  <div>Paid: <span id="pd"></span></div>
  <div>Remaining: <span id="rem"></span></div>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>✓</th><th>항목</th><th>금액</th><th>일자</th><th>구분</th>
</tr>
</thead>
<tbody id="tbl"></tbody>
</table>
</div>

<script>
const rawData=[
  {id:'rent',n:'월세',a:1915,t:'공동',day:1},
  {id:'food',n:'식비',a:800,t:'공동',day:1},
  {id:'phone',n:'통신',a:158.2,t:'공동',day:10},
  {id:'youtube',n:'Youtube',a:19.2,t:'개인',day:18},
  {id:'netflix',n:'Netflix',a:9.03,t:'개인',day:18},
  {id:'rbc',n:'RBC',a:16.95,t:'개인',day:25},
  {id:'prime',n:'Amazon',a:11.29,t:'개인',day:27},
  {id:'amex',n:'AMEX',a:0,t:'개인',day:17,v:true},
  {id:'td',n:'TD',a:0,t:'개인',day:17,v:true}
];

let checked=new Set();

function format(v){
  return new Intl.NumberFormat('ko-KR',{style:'currency',currency:'CAD'}).format(v||0);
}

function getMonthData(){
  const sel=document.getElementById('selDate').value;
  if(!sel) return [];
  const month=sel.slice(5,7);

  const amex=parseFloat(document.getElementById('amex').value)||0;
  const td=parseFloat(document.getElementById('td').value)||0;

  return rawData.map(x=>{
    let amount=x.a;
    if(x.id==='amex') amount=amex;
    if(x.id==='td') amount=td;

    return {
      ...x,
      a:amount,
      d:`${month}-${String(x.day).padStart(2,'0')}`,
      key:x.id+"_"+month
    };
  });
}

function render(){
  const data=getMonthData();

  const paid=data.filter(x=>checked.has(x.key));
  const unpaid=data.filter(x=>!checked.has(x.key));

  const sum=v=>v.reduce((t,x)=>t+x.a,0);

  document.getElementById('sch').textContent=format(sum(data));
  document.getElementById('pd').textContent=format(sum(paid));
  document.getElementById('rem').textContent=format(sum(unpaid));

  document.getElementById('tbl').innerHTML=data.map(x=>{
    const isChecked=checked.has(x.key);
    return `
    <tr onclick="toggle('${x.key}')">
      <td><input type="checkbox" ${isChecked?'checked':''} onclick="event.stopPropagation();toggle('${x.key}')"></td>
      <td>${x.n}</td>
      <td class="amount">${format(x.a)}</td>
      <td>${x.d}</td>
      <td>${x.t}</td>
    </tr>
    `;
  }).join('');
}

function toggle(key){
  if(checked.has(key)) checked.delete(key);
  else checked.add(key);
  render();
}

// 이벤트
['selDate','amex','td'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
});

// 초기값
const today=new Date();
document.getElementById('selDate').value=today.toISOString().slice(0,10);
render();
</script>

</body>
</html>
